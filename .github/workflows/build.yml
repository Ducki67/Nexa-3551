name: Build and Release

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: nexa-linux
            executable_ext: ""
          - os: windows-latest
            artifact_name: nexa-windows
            executable_ext: ".exe"
          - os: macos-latest
            artifact_name: nexa-macos
            executable_ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate bundled index
        run: bun run build.ts

      - name: Build executable
        run: bun build ./src/index.bundled.ts --compile --outfile nexa${{ matrix.executable_ext }}

      - name: Create artifact directory
        run: mkdir -p artifact

      - name: Copy executable and static folder (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp nexa${{ matrix.executable_ext }} artifact/
          cp -r static artifact/

      - name: Copy executable and static folder (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item nexa${{ matrix.executable_ext }} artifact/
          Copy-Item -Recurse static artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact/
          retention-days: 30
