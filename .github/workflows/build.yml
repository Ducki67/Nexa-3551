name: Build and Release

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        include:
          - os: windows-latest
            artifact_name: nexa-windows
            executable_ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build executable
        run: bun build ./src/index.ts --compile

      - name: Create artifact directory
        run: mkdir -p artifact

      - name: Copy executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: cp $(ls | grep -E ".*${{ matrix.executable_ext }}$") artifact/

      - name: Copy executable (Windows)
        if: runner.os == 'Windows'
        run: |
          $exe = Get-ChildItem -Path . -Filter "*${{ matrix.executable_ext }}" | Select-Object -First 1
          Copy-Item $exe.FullName artifact\

      - name: Create zip (Linux/macOS)
        if: runner.os != 'Windows'
        run: zip -r ${{ matrix.artifact_name }}.zip artifact/*

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path artifact\* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 30
